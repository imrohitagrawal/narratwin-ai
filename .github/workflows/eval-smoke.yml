name: eval smoke

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: eval-smoke-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  eval-smoke:
    name: eval smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: python -m pip install uv==0.11.18
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run eval smoke
        run: bash scripts/ci/eval-smoke.sh
      - name: Upload eval smoke report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: eval-smoke-report
          path: reports/eval-smoke/stage4-grounded-script-report.json
          if-no-files-found: error
          retention-days: 7
