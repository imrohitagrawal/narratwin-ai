name: Quality Gates

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]
    branches:
      - main
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: quality-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy-gates:
    name: policy-gates
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Run repository guardrails
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LLM_PROVIDER: mock
          EMBEDDING_PROVIDER: mock
          EVALUATION_PROVIDER: mock
          TRANSLATION_PROVIDER: mock
          AVATAR_PROVIDER: mock
          TTS_PROVIDER: mock
          STT_PROVIDER: mock
          SUBTITLE_PROVIDER: mock
          VIDEO_RENDERER: local
          STORAGE_PROVIDER: local
          VECTOR_STORE: disabled
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          GITHUB_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: python scripts/guardrails_check.py

      - name: Verify branch protection required contexts
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/ci/verify_branch_protection.py

      - name: Run stage quality gate
        env:
          LLM_PROVIDER: mock
          EMBEDDING_PROVIDER: mock
          EVALUATION_PROVIDER: mock
          TRANSLATION_PROVIDER: mock
          AVATAR_PROVIDER: mock
          TTS_PROVIDER: mock
          STT_PROVIDER: mock
          SUBTITLE_PROVIDER: mock
          VIDEO_RENDERER: local
          STORAGE_PROVIDER: local
          VECTOR_STORE: disabled
          GITHUB_HEAD_REF: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          NARRATWIN_POLICY_ONLY: "1"
        run: make quality
