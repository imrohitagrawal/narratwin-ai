name: Quality Gates

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main

permissions:
  contents: read

concurrency:
  group: quality-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy-gates:
    name: policy-gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Enforce issue-linked pull request
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          event = json.loads(Path(os.environ['GITHUB_EVENT_PATH']).read_text())
          pr = event.get('pull_request', {})
          body = pr.get('body') or ''
          head_ref = (pr.get('head') or {}).get('ref')
          base_ref = (pr.get('base') or {}).get('ref')
          if head_ref == 'main':
              raise SystemExit('Pull request head branch must not be main.')
          if base_ref != 'main':
              raise SystemExit('Guardrail workflow expects pull requests to target main.')
          if not re.search(r'(?i)(close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#\d+', body):
              raise SystemExit('Pull request body must link an issue using Closes #<issue>, Fixes #<issue>, or Resolves #<issue>.')
          print('Issue-linked pull request guardrail passed.')
          PY

      - name: Run repository guardrails
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: python scripts/guardrails_check.py

      - name: Run tests when present without paid providers
        shell: bash
        env:
          LLM_PROVIDER: mock
          AVATAR_PROVIDER: mock
          TTS_PROVIDER: mock
          STT_PROVIDER: mock
          STORAGE_PROVIDER: local
          VECTOR_STORE: local
          APP_ENV: test
        run: |
          set -euo pipefail
          if [ -f pyproject.toml ] || [ -f pytest.ini ] || [ -d tests ]; then
            python -m pip install --upgrade pip
            if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi
            if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
            python -m pytest
          elif [ -f package.json ]; then
            corepack enable || true
            if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile && pnpm test;
            elif [ -f yarn.lock ]; then yarn install --frozen-lockfile && yarn test;
            elif [ -f package-lock.json ]; then npm ci && npm test;
            else npm install && npm test; fi
          else
            echo "No test project detected yet. Policy gates completed."
          fi
