name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  backend:
    name: lint / typecheck / unit / api
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: python -m pip install uv==0.11.18
      - name: Install dependencies
        run: uv sync --frozen
      - name: Backend lint and typecheck
        run: bash scripts/ci/backend-lint.sh
      - name: Backend unit and API tests
        run: bash scripts/ci/backend-test.sh

  frontend:
    name: frontend tests / playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend lint, typecheck, unit tests, build
        run: bash scripts/ci/frontend-build.sh
      - name: Playwright smoke
        run: bash scripts/ci/frontend-smoke.sh

  docker:
    name: ci / docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Docker build
        run: bash scripts/ci/docker-build.sh
