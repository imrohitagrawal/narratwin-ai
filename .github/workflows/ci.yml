name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  backend:
    name: lint / typecheck / unit / api
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: python -m pip install uv==0.11.18
      - name: Install dependencies
        run: uv sync --frozen
      - name: Backend lint and typecheck
        run: bash scripts/ci/backend-lint.sh
      - name: Backend unit and API tests
        run: bash scripts/ci/backend-test.sh

  frontend:
    name: frontend tests / playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend lint, typecheck, unit tests, build
        run: bash scripts/ci/frontend-build.sh
      - name: Playwright smoke
        run: bash scripts/ci/frontend-smoke.sh

  docker:
    name: ci / docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Docker build
        run: bash scripts/ci/docker-build.sh

  stage8-budgets:
    name: stage8 / performance lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Read active stage
        id: active-stage
        run: echo "stage=$(cat .stage/current)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        if: steps.active-stage.outputs.stage == '8'
        with:
          python-version: "3.13"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: steps.active-stage.outputs.stage == '8'
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install uv
        if: steps.active-stage.outputs.stage == '8'
        run: python -m pip install uv==0.11.18
      - name: Install backend dependencies
        if: steps.active-stage.outputs.stage == '8'
        run: uv sync --frozen
      - name: Stage 8 API performance smoke
        if: steps.active-stage.outputs.stage == '8'
        run: bash scripts/ci/performance-smoke.sh
      - name: Stage 8 frontend Lighthouse
        if: steps.active-stage.outputs.stage == '8'
        run: bash scripts/ci/frontend-lighthouse.sh
      - name: Upload Stage 8 performance and Lighthouse reports
        if: always() && steps.active-stage.outputs.stage == '8'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: stage8-performance-lighthouse-reports
          path: |
            reports/performance
            reports/lighthouse
          if-no-files-found: error
          retention-days: 7
