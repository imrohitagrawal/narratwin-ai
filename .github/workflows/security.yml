name: security

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]
    branches:
      - main
      - phase-1-closure-**
  push:
    branches-ignore: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  security:
    name: secret scan / bandit / audit / semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install uv
        run: python -m pip install uv==0.11.18
      - name: Install dependencies
        run: |
          uv sync --frozen
      - name: Repository guardrails
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          GITHUB_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: python scripts/guardrails_check.py
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
      - name: Bandit, dependency audit, Semgrep
        env:
          NARRATWIN_GITLEAKS_ACTION_COMPLETED: "1"
        run: bash scripts/ci/dependency-security.sh

  docker:
    name: security / docker build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Docker build compatibility context
        run: bash scripts/ci/docker-build.sh
      - name: Docker image vulnerability scan
        run: bash scripts/ci/docker-image-scan.sh
      - name: Upload Docker image scan reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docker-image-scan-reports
          path: reports/security
          if-no-files-found: error
          retention-days: 7
